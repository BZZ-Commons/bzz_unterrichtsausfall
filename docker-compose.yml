name: unterrichtsausfaelle

# Secrets are read from individual files in ./secrets/ (one value per file, no key=value).
# Run `./scripts/init-secrets.sh` to create them, or create manually:
#   echo -n 'value' > secrets/webuntis_school
#   echo -n 'value' > secrets/webuntis_username
#   echo -n 'value' > secrets/webuntis_password
#   echo -n 'value' > secrets/webuntis_base_url
secrets:
  webuntis_school:
    file: ./secrets/webuntis_school
  webuntis_username:
    file: ./secrets/webuntis_username
  webuntis_password:
    file: ./secrets/webuntis_password
  webuntis_base_url:
    file: ./secrets/webuntis_base_url

services:
  app:
    build: .
    image: unterrichtsausfaelle:latest
    container_name: unterrichtsausfaelle
    ports:
      - "127.0.0.1:3002:3000"
    restart: always
    secrets:
      - webuntis_school
      - webuntis_username
      - webuntis_password
      - webuntis_base_url

    # ── Security hardening ────────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
      - /app/.next/cache:uid=1001,gid=1001,size=256m

    # ── Resource limits ───────────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

    # ── Healthcheck ───────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
