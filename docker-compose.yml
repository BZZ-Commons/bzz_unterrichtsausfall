name: unterrichtsausfaelle

# Runtime config is read from a local .env file (one KEY=VALUE per line, gitignored).
# Create it from .env.example:
#   cp .env.example .env  &&  edit the four WEBUNTIS_* values
# The same .env scheme is used on deplo.io (there the vars are set via the Cockpit UI).

services:
  app:
    build: .
    image: unterrichtsausfaelle:latest
    container_name: unterrichtsausfaelle
    ports:
      - "127.0.0.1:3002:3000"
    restart: always
    env_file: .env

    # ── Security hardening ────────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
      - /app/.next/cache:uid=1001,gid=1001,size=256m

    # ── Resource limits ───────────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

    # ── Healthcheck ───────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
